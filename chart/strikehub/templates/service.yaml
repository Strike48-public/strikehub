apiVersion: v1
kind: Service
metadata:
  name: {{ include "strikehub.fullname" . }}
  labels:
    {{- include "strikehub.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: 4000
      targetPort: oauth-cb
      protocol: TCP
      name: oauth-cb
  selector:
    {{- include "strikehub.selectorLabels" . | nindent 4 }}
