name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: strike48/strikehub
  PICK_VERSION: v0.1.0
  KUBESTUDIO_VERSION: v0.1.0

jobs:
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: strikehub-linux-x86_64
            connector_suffix: linux-x86_64
            binary_name: strikehub
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: strikehub-darwin-x86_64
            connector_suffix: darwin-x86_64
            binary_name: strikehub
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: strikehub-darwin-aarch64
            connector_suffix: darwin-aarch64
            binary_name: strikehub
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: strikehub-windows-x86_64
            connector_suffix: windows-x86_64
            binary_name: strikehub.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev libxdo-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --no-default-features --features desktop

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/${{ matrix.binary_name }}

      # Connector downloads are best-effort — releases may not exist yet.
      - name: Download pentest-agent
        if: runner.os != 'Windows'
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download ${{ env.PICK_VERSION }} \
            --repo Strike48-public/pick \
            --pattern "pentest-agent-${{ matrix.connector_suffix }}.tar.gz" \
            --dir dist
          cd dist && tar -xzf pentest-agent-${{ matrix.connector_suffix }}.tar.gz \
            && rm -f pentest-agent-${{ matrix.connector_suffix }}.tar.gz

      - name: Download ks-connector (Unix)
        if: runner.os != 'Windows'
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download ${{ env.KUBESTUDIO_VERSION }} \
            --repo Strike48-public/kubestudio \
            --pattern "ks-connector-${{ matrix.connector_suffix }}.tar.gz" \
            --dir dist
          cd dist && tar -xzf ks-connector-${{ matrix.connector_suffix }}.tar.gz \
            && rm -f ks-connector-${{ matrix.connector_suffix }}.tar.gz

      - name: Download ks-connector (Windows)
        if: runner.os == 'Windows'
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download ${{ env.KUBESTUDIO_VERSION }} \
            --repo Strike48-public/kubestudio \
            --pattern "ks-connector-${{ matrix.connector_suffix }}.zip" \
            --dir dist
          cd dist && unzip ks-connector-${{ matrix.connector_suffix }}.zip \
            && rm -f ks-connector-${{ matrix.connector_suffix }}.zip

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        working-directory: dist
        run: |
          tar -czvf ${{ matrix.artifact }}.tar.gz *
          # Keep only the archive for upload
          find . -maxdepth 1 ! -name '*.tar.gz' ! -name '*.sha256' -type f -delete

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: bash
        working-directory: dist
        run: |
          7z a ${{ matrix.artifact }}.zip *
          # Keep only the archive for upload
          find . -maxdepth 1 ! -name '*.zip' ! -name '*.sha256' -type f -delete

      - name: Generate checksums
        shell: bash
        working-directory: dist
        run: |
          if command -v sha256sum &> /dev/null; then
            sha256sum * > ${{ matrix.artifact }}.sha256
          else
            shasum -a 256 * > ${{ matrix.artifact }}.sha256
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  release:
    name: Release
    needs: [build, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: strikehub-*

      - name: Prepare assets
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          body: |
            ## StrikeHub ${{ github.ref_name }}

            ### Downloads

            | Platform | Architecture | Download |
            |----------|--------------|----------|
            | macOS | Apple Silicon | `strikehub-darwin-aarch64.tar.gz` |
            | macOS | Intel | `strikehub-darwin-x86_64.tar.gz` |
            | Linux | x86_64 | `strikehub-linux-x86_64.tar.gz` |
            | Windows | x86_64 | `strikehub-windows-x86_64.zip` |

            Each archive includes bundled connectors (`ks-connector` and `pentest-agent`).
            Windows includes `ks-connector` only — `pentest-agent` is not yet available for Windows.

            ### Docker

            ```bash
            docker pull ghcr.io/strike48/strikehub:${{ github.ref_name }}
            ```

            ### Helm

            ```bash
            helm install strikehub chart/strikehub \
              --set image.tag=${{ github.ref_name }}
            ```

            ### Checksums

            See individual `.sha256` files for checksums.
