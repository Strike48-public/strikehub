name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build only, no publish)'
        required: true
        default: true
        type: boolean

# Only run in the origin repo, never on forks
run-name: "Release ${{ github.ref_name }} (org-only)"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    name: Docker Image
    if: github.repository_owner == 'Strike48-public'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build:
    name: Build ${{ matrix.target }}
    if: github.repository_owner == 'Strike48-public'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: strikehub-darwin-x86_64
            binary_name: strikehub
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: strikehub-darwin-aarch64
            binary_name: strikehub

    steps:
      - uses: actions/checkout@v4

      - name: Load connector refs
        run: cat connector-versions.env >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --no-default-features --features desktop

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/${{ matrix.binary_name }}

      # Build connectors from source at pinned git refs
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}

      - name: Checkout and build pentest-agent
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/Strike48-public/pick.git /tmp/pick
          git -C /tmp/pick checkout ${{ env.PICK_REF }}
          cargo build --release --manifest-path /tmp/pick/Cargo.toml --bin pentest-agent --target ${{ matrix.target }}
          cp /tmp/pick/target/${{ matrix.target }}/release/pentest-agent dist/

      - name: Checkout and build ks-connector
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/Strike48-public/kubestudio.git /tmp/kubestudio
          git -C /tmp/kubestudio checkout ${{ env.KUBESTUDIO_REF }}
          cargo build --release --manifest-path /tmp/kubestudio/Cargo.toml --bin ks-connector --features connector --target ${{ matrix.target }}
          cp /tmp/kubestudio/target/${{ matrix.target }}/release/ks-connector dist/

      - name: Package archive
        shell: bash
        working-directory: dist
        run: |
          tar -czvf ${{ matrix.artifact }}.tar.gz *
          # Keep only the archive for upload
          find . -maxdepth 1 ! -name '*.tar.gz' ! -name '*.sha256' -type f -delete

      - name: Generate checksums
        shell: bash
        working-directory: dist
        run: shasum -a 256 * > ${{ matrix.artifact }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  installers:
    name: Build ${{ matrix.name }}
    if: github.repository_owner == 'Strike48-public'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: AppImage x86_64
            target: x86_64-unknown-linux-gnu
            arch: x86_64
            artifact: strikehub-appimage-x86_64
            installer: appimage
            binary_name: strikehub
          - os: ubuntu-24.04-arm
            name: AppImage aarch64
            target: aarch64-unknown-linux-gnu
            arch: aarch64
            artifact: strikehub-appimage-aarch64
            installer: appimage
            binary_name: strikehub
          - os: windows-latest
            name: MSI x86_64
            target: x86_64-pc-windows-msvc
            arch: x86_64
            artifact: strikehub-windows-x86_64
            installer: msi
            binary_name: strikehub.exe

    steps:
      - uses: actions/checkout@v4

      - name: Load connector refs
        shell: bash
        run: cat connector-versions.env >> "$GITHUB_ENV"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            libpcap-dev \
            file \
            wget \
            imagemagick \
            libfuse2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-${{ matrix.installer }}

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }} --no-default-features --features desktop

      - name: Prepare dist directory
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/${{ matrix.binary_name }}

      # Build connectors from source at pinned git refs
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}

      - name: Checkout and build pentest-agent
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/Strike48-public/pick.git /tmp/pick
          git -C /tmp/pick checkout ${{ env.PICK_REF }}
          cargo build --release --manifest-path /tmp/pick/Cargo.toml --bin pentest-agent --target ${{ matrix.target }}
          cp /tmp/pick/target/${{ matrix.target }}/release/pentest-agent${{ runner.os == 'Windows' && '.exe' || '' }} dist/

      - name: Checkout and build ks-connector
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/Strike48-public/kubestudio.git /tmp/kubestudio
          git -C /tmp/kubestudio checkout ${{ env.KUBESTUDIO_REF }}
          cargo build --release --manifest-path /tmp/kubestudio/Cargo.toml --bin ks-connector --features connector --target ${{ matrix.target }}
          cp /tmp/kubestudio/target/${{ matrix.target }}/release/ks-connector${{ runner.os == 'Windows' && '.exe' || '' }} dist/

      # ── AppImage steps ──
      - name: Build AppImage
        if: matrix.installer == 'appimage'
        run: |
          chmod +x scripts/build-appimage.sh
          TAG_VERSION="${{ github.ref_name }}"
          VERSION="${TAG_VERSION#v}"
          ./scripts/build-appimage.sh "$VERSION" "${{ matrix.arch }}"

      - name: Generate checksum (AppImage)
        if: matrix.installer == 'appimage'
        run: sha256sum StrikeHub-*.AppImage > ${{ matrix.artifact }}.AppImage.sha256

      - uses: actions/upload-artifact@v4
        if: matrix.installer == 'appimage'
        with:
          name: ${{ matrix.artifact }}
          path: |
            StrikeHub-*.AppImage
            *.AppImage.sha256

      # ── MSI steps ──
      - name: Build Windows MSI
        if: matrix.installer == 'msi'
        shell: pwsh
        run: |
          $Version = "${{ github.ref_name }}".TrimStart("v")
          .\scripts\build-msi.ps1 -Version $Version -Arch ${{ matrix.arch }}
          Move-Item "StrikeHub-$Version-${{ matrix.arch }}.msi" "dist\${{ matrix.artifact }}.msi"

      - name: Clean dist for MSI
        if: matrix.installer == 'msi'
        shell: bash
        working-directory: dist
        run: find . -maxdepth 1 ! -name '*.msi' ! -name '*.sha256' -type f -delete

      - name: Generate checksum (MSI)
        if: matrix.installer == 'msi'
        shell: bash
        working-directory: dist
        run: |
          if command -v sha256sum &> /dev/null; then
            sha256sum * > ${{ matrix.artifact }}.sha256
          else
            shasum -a 256 * > ${{ matrix.artifact }}.sha256
          fi

      - uses: actions/upload-artifact@v4
        if: matrix.installer == 'msi'
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  dmg:
    name: Build DMG (${{ matrix.arch }})
    if: github.repository_owner == 'Strike48-public'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            arch: x86_64
            target: x86_64-apple-darwin
            connector_suffix: darwin-x86_64
          - os: macos-14
            arch: aarch64
            target: aarch64-apple-darwin
            connector_suffix: darwin-aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Load connector refs
        run: cat connector-versions.env >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-dmg

      - name: Install rsvg-convert
        run: brew install librsvg

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }} --no-default-features --features desktop

      - name: Prepare dist directory
        run: mkdir -p dist

      # Build connectors from source at pinned git refs
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}

      - name: Checkout and build pentest-agent
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/Strike48-public/pick.git /tmp/pick
          git -C /tmp/pick checkout ${{ env.PICK_REF }}
          cargo build --release --manifest-path /tmp/pick/Cargo.toml --bin pentest-agent --target ${{ matrix.target }}
          cp /tmp/pick/target/${{ matrix.target }}/release/pentest-agent dist/

      - name: Checkout and build ks-connector
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/Strike48-public/kubestudio.git /tmp/kubestudio
          git -C /tmp/kubestudio checkout ${{ env.KUBESTUDIO_REF }}
          cargo build --release --manifest-path /tmp/kubestudio/Cargo.toml --bin ks-connector --features connector --target ${{ matrix.target }}
          cp /tmp/kubestudio/target/${{ matrix.target }}/release/ks-connector dist/

      - name: Make build script executable
        run: chmod +x scripts/build-dmg.sh

      - name: Build DMG
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          VERSION="${TAG_VERSION#v}"
          ./scripts/build-dmg.sh "$VERSION" "${{ matrix.arch }}"

      - name: Verify DMG
        run: |
          hdiutil verify StrikeHub-*.dmg
          hdiutil attach StrikeHub-*.dmg -mountpoint /tmp/dmg-verify
          echo "=== App bundle contents ==="
          ls -la /tmp/dmg-verify/StrikeHub.app/Contents/MacOS/
          test -x /tmp/dmg-verify/StrikeHub.app/Contents/MacOS/strikehub-bin
          test -f /tmp/dmg-verify/StrikeHub.app/Contents/Info.plist
          codesign --verify /tmp/dmg-verify/StrikeHub.app
          grep -q "studio.strike48.com" /tmp/dmg-verify/StrikeHub.app/Contents/MacOS/strikehub
          hdiutil detach /tmp/dmg-verify

      - name: Generate checksum
        run: |
          shasum -a 256 StrikeHub-*.dmg > strikehub-darwin-${{ matrix.arch }}.dmg.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: strikehub-dmg-${{ matrix.arch }}
          path: |
            StrikeHub-*.dmg
            *.dmg.sha256

  release:
    name: Release
    if: github.repository_owner == 'Strike48-public'
    needs: [build, docker, installers, dmg]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: strikehub-*
          merge-multiple: false

      - name: Prepare assets
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Create Release
        if: github.event_name != 'workflow_dispatch' || !inputs.dry_run
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          body: |
            ## StrikeHub ${{ github.ref_name }}

            ### Downloads

            | Platform | Architecture | Download |
            |----------|--------------|----------|
            | macOS DMG | Apple Silicon | `StrikeHub-*-aarch64.dmg` |
            | macOS DMG | Intel | `StrikeHub-*-x86_64.dmg` |
            | macOS | Apple Silicon | `strikehub-darwin-aarch64.tar.gz` |
            | macOS | Intel | `strikehub-darwin-x86_64.tar.gz` |
            | Linux AppImage | x86_64 | `StrikeHub-*-x86_64.AppImage` |
            | Linux AppImage | aarch64 | `StrikeHub-*-aarch64.AppImage` |
            | Windows MSI | x86_64 | `strikehub-windows-x86_64.msi` |

            All packages include bundled connectors (`ks-connector` and `pentest-agent`) and pre-configured environment variables.
            - **`.msi`** — Windows installer with Start Menu, desktop shortcut, and system env vars
            - **`.AppImage`** — Portable Linux package, runs on most distributions without installation

            ### Docker

            ```bash
            docker pull ${{ env.REGISTRY }}/${{ github.repository }}:${{ github.ref_name }}
            ```

            ### Helm

            ```bash
            helm install strikehub chart/strikehub \
              --set image.tag=${{ github.ref_name }}
            ```

            ### Checksums

            See individual `.sha256` files for checksums.
