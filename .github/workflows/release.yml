name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build only, no publish)'
        required: true
        default: true
        type: boolean

# Only run in the origin repo, never on forks
run-name: "Release ${{ github.ref_name }} (org-only)"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    name: Docker Image
    if: github.repository_owner == 'Strike48-public'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build:
    name: Build ${{ matrix.target }}
    if: github.repository_owner == 'Strike48-public'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: strikehub-linux-x86_64
            connector_suffix: linux-x86_64
            binary_name: strikehub
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: strikehub-darwin-x86_64
            connector_suffix: darwin-x86_64
            binary_name: strikehub
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: strikehub-darwin-aarch64
            connector_suffix: darwin-aarch64
            binary_name: strikehub
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: strikehub-windows-x86_64
            connector_suffix: windows-x86_64
            binary_name: strikehub.exe

    steps:
      - uses: actions/checkout@v4

      - name: Load connector versions
        run: cat connector-versions.env >> "$GITHUB_ENV"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev libxdo-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --no-default-features --features desktop

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/${{ matrix.binary_name }}

      # Connector downloads are best-effort — releases may not exist yet.
      - name: Download pentest-agent (Unix)
        if: runner.os != 'Windows'
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download ${{ env.PICK_VERSION }} \
            --repo Strike48-public/pick \
            --pattern "pentest-agent-${{ matrix.connector_suffix }}.tar.gz" \
            --dir dist
          cd dist && tar -xzf pentest-agent-${{ matrix.connector_suffix }}.tar.gz \
            && rm -f pentest-agent-${{ matrix.connector_suffix }}.tar.gz

      - name: Download pentest-agent (Windows)
        if: runner.os == 'Windows'
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download ${{ env.PICK_VERSION }} \
            --repo Strike48-public/pick \
            --pattern "pentest-agent-${{ matrix.connector_suffix }}.zip" \
            --dir dist
          cd dist && unzip pentest-agent-${{ matrix.connector_suffix }}.zip \
            && rm -f pentest-agent-${{ matrix.connector_suffix }}.zip

      - name: Download ks-connector (Unix)
        if: runner.os != 'Windows'
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download ${{ env.KUBESTUDIO_VERSION }} \
            --repo Strike48-public/kubestudio \
            --pattern "ks-connector-${{ matrix.connector_suffix }}.tar.gz" \
            --dir dist
          cd dist && tar -xzf ks-connector-${{ matrix.connector_suffix }}.tar.gz \
            && rm -f ks-connector-${{ matrix.connector_suffix }}.tar.gz

      - name: Download ks-connector (Windows)
        if: runner.os == 'Windows'
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download ${{ env.KUBESTUDIO_VERSION }} \
            --repo Strike48-public/kubestudio \
            --pattern "ks-connector-${{ matrix.connector_suffix }}.zip" \
            --dir dist
          cd dist && unzip ks-connector-${{ matrix.connector_suffix }}.zip \
            && rm -f ks-connector-${{ matrix.connector_suffix }}.zip

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        working-directory: dist
        run: |
          tar -czvf ${{ matrix.artifact }}.tar.gz *
          # Keep only the archive for upload
          find . -maxdepth 1 ! -name '*.tar.gz' ! -name '*.sha256' -type f -delete

      - name: Build Windows SFX (single-file exe)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Create VBScript launcher (no console window)
          cat > dist/StrikeHub-Launch.vbs << 'EOF'
          Set WshShell = CreateObject("WScript.Shell")
          Set WshEnv = WshShell.Environment("Process")
          If WshEnv("STRIKE48_API_URL") = "" Then
              WshEnv("STRIKE48_API_URL") = "https://studio.strike48.com"
          End If
          If WshEnv("STRIKE48_URL") = "" Then
              WshEnv("STRIKE48_URL") = "wss://studio.strike48.com"
          End If
          scriptDir = Left(WScript.ScriptFullName, InStrRev(WScript.ScriptFullName, "\"))
          WshShell.Run """" & scriptDir & "strikehub.exe""", 0, False
          EOF

          # Create SFX config
          cat > sfx-config.txt << 'SFXCFG'
          ;!@Install@!UTF-8!
          Title="StrikeHub"
          RunProgram="wscript.exe StrikeHub-Launch.vbs"
          InstallPath="%LOCALAPPDATA%\\StrikeHub"
          GUIMode="2"
          OverwriteMode="2"
          ;!@InstallEnd@!
          SFXCFG

          # Download 7-Zip SFX module
          curl -sL "https://github.com/nicehash/7zsfxmm/raw/master/files/7zSD.sfx" -o 7zSD.sfx

          # Build archive from dist contents
          cd dist && 7z a -mx=9 ../sfx-payload.7z * && cd ..

          # Combine: SFX stub + config + archive = single exe
          cat 7zSD.sfx sfx-config.txt sfx-payload.7z > "dist/${{ matrix.artifact }}.exe"

          # Clean up - keep only the SFX exe
          cd dist
          find . -maxdepth 1 ! -name '*.exe' -a -name '${{ matrix.artifact }}*' -type f -delete
          find . -maxdepth 1 ! -name '${{ matrix.artifact }}*' -type f -delete

      - name: Build Windows MSI installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Version = "${{ github.ref_name }}".TrimStart("v")
          .\scripts\build-msi.ps1 -Version $Version
          Move-Item "StrikeHub-$Version-x86_64.msi" "dist\${{ matrix.artifact }}.msi"

      - name: Generate checksums
        shell: bash
        working-directory: dist
        run: |
          if command -v sha256sum &> /dev/null; then
            sha256sum * > ${{ matrix.artifact }}.sha256
          else
            shasum -a 256 * > ${{ matrix.artifact }}.sha256
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  appimage:
    name: Build AppImage
    if: github.repository_owner == 'Strike48-public'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load connector versions
        run: cat connector-versions.env >> "$GITHUB_ENV"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            file \
            wget \
            imagemagick \
            libfuse2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-gnu-appimage

      - name: Build binary
        run: cargo build --release --target x86_64-unknown-linux-gnu --no-default-features --features desktop

      - name: Prepare dist directory
        run: mkdir -p dist

      # Download connectors (best-effort)
      - name: Download pentest-agent
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download ${{ env.PICK_VERSION }} \
            --repo Strike48-public/pick \
            --pattern "pentest-agent-linux-x86_64.tar.gz" \
            --dir dist
          cd dist && tar -xzf pentest-agent-linux-x86_64.tar.gz \
            && rm -f pentest-agent-linux-x86_64.tar.gz

      - name: Download ks-connector
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download ${{ env.KUBESTUDIO_VERSION }} \
            --repo Strike48-public/kubestudio \
            --pattern "ks-connector-linux-x86_64.tar.gz" \
            --dir dist
          cd dist && tar -xzf ks-connector-linux-x86_64.tar.gz \
            && rm -f ks-connector-linux-x86_64.tar.gz

      - name: Make build script executable
        run: chmod +x scripts/build-appimage.sh

      - name: Build AppImage
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          VERSION="${TAG_VERSION#v}"  # Remove 'v' prefix if present
          ./scripts/build-appimage.sh "$VERSION" x86_64

      - name: Generate checksum
        run: |
          sha256sum StrikeHub-*.AppImage > strikehub-linux-x86_64.AppImage.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: strikehub-appimage
          path: |
            StrikeHub-*.AppImage
            *.AppImage.sha256

  dmg:
    name: Build DMG (${{ matrix.arch }})
    if: github.repository_owner == 'Strike48-public'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            arch: x86_64
            target: x86_64-apple-darwin
            connector_suffix: darwin-x86_64
          - os: macos-14
            arch: aarch64
            target: aarch64-apple-darwin
            connector_suffix: darwin-aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Load connector versions
        run: cat connector-versions.env >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-dmg

      - name: Install rsvg-convert
        run: brew install librsvg

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }} --no-default-features --features desktop

      - name: Prepare dist directory
        run: mkdir -p dist

      # Download connectors (best-effort)
      - name: Download pentest-agent
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download ${{ env.PICK_VERSION }} \
            --repo Strike48-public/pick \
            --pattern "pentest-agent-${{ matrix.connector_suffix }}.tar.gz" \
            --dir dist
          cd dist && tar -xzf pentest-agent-${{ matrix.connector_suffix }}.tar.gz \
            && rm -f pentest-agent-${{ matrix.connector_suffix }}.tar.gz

      - name: Download ks-connector
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download ${{ env.KUBESTUDIO_VERSION }} \
            --repo Strike48-public/kubestudio \
            --pattern "ks-connector-${{ matrix.connector_suffix }}.tar.gz" \
            --dir dist
          cd dist && tar -xzf ks-connector-${{ matrix.connector_suffix }}.tar.gz \
            && rm -f ks-connector-${{ matrix.connector_suffix }}.tar.gz

      - name: Make build script executable
        run: chmod +x scripts/build-dmg.sh

      - name: Build DMG
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          VERSION="${TAG_VERSION#v}"
          ./scripts/build-dmg.sh "$VERSION" "${{ matrix.arch }}"

      - name: Verify DMG
        run: |
          hdiutil verify StrikeHub-*.dmg
          hdiutil attach StrikeHub-*.dmg -mountpoint /tmp/dmg-verify
          echo "=== App bundle contents ==="
          ls -la /tmp/dmg-verify/StrikeHub.app/Contents/MacOS/
          test -x /tmp/dmg-verify/StrikeHub.app/Contents/MacOS/strikehub-bin
          test -f /tmp/dmg-verify/StrikeHub.app/Contents/Info.plist
          codesign --verify /tmp/dmg-verify/StrikeHub.app
          grep -q "studio.strike48.com" /tmp/dmg-verify/StrikeHub.app/Contents/MacOS/strikehub
          hdiutil detach /tmp/dmg-verify

      - name: Generate checksum
        run: |
          shasum -a 256 StrikeHub-*.dmg > strikehub-darwin-${{ matrix.arch }}.dmg.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: strikehub-dmg-${{ matrix.arch }}
          path: |
            StrikeHub-*.dmg
            *.dmg.sha256

  release:
    name: Release
    if: github.repository_owner == 'Strike48-public'
    needs: [build, docker, appimage, dmg]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare assets
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Create Release
        if: github.event_name != 'workflow_dispatch' || !inputs.dry_run
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          body: |
            ## StrikeHub ${{ github.ref_name }}

            ### Downloads

            | Platform | Architecture | Download |
            |----------|--------------|----------|
            | macOS DMG | Apple Silicon | `StrikeHub-*-aarch64.dmg` |
            | macOS DMG | Intel | `StrikeHub-*-x86_64.dmg` |
            | macOS | Apple Silicon | `strikehub-darwin-aarch64.tar.gz` |
            | macOS | Intel | `strikehub-darwin-x86_64.tar.gz` |
            | Linux | x86_64 | `strikehub-linux-x86_64.tar.gz` |
            | Linux AppImage | x86_64 | `StrikeHub-*.AppImage` |
            | Windows | x86_64 | `strikehub-windows-x86_64.exe` |
            | Windows MSI | x86_64 | `strikehub-windows-x86_64.msi` |

            All packages include bundled connectors (`ks-connector` and `pentest-agent`) and pre-configured environment variables.
            - **`.exe`** — Single file, just download and run (like AppImage)
            - **`.msi`** — Windows installer with Start Menu, desktop shortcut, and system env vars

            The AppImage is a portable, self-contained package that runs on most Linux distributions without installation.

            ### Docker

            ```bash
            docker pull ${{ env.REGISTRY }}/${{ github.repository }}:${{ github.ref_name }}
            ```

            ### Helm

            ```bash
            helm install strikehub chart/strikehub \
              --set image.tag=${{ github.ref_name }}
            ```

            ### Checksums

            See individual `.sha256` files for checksums.
