name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --no-default-features --features desktop -p sh-ui -p sh-core -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --no-default-features --features desktop

  build-server:
    name: Build Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --bin strikehub-server --features server --no-default-features -p sh-ui

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-dmg:
    name: Build DMG (${{ matrix.arch }})
    if: github.repository_owner == 'Strike48-public'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            arch: x86_64
            target: x86_64-apple-darwin
          - os: macos-14
            arch: aarch64
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-dmg

      - name: Install rsvg-convert
        run: brew install librsvg

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }} --no-default-features --features desktop

      - name: Load connector refs
        run: cat connector-versions.env >> "$GITHUB_ENV"

      - name: Prepare dist directory
        run: mkdir -p dist

      # Build connectors from source at pinned git refs
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}

      - name: Checkout and build pentest-agent
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/Strike48-public/pick.git /tmp/pick
          git -C /tmp/pick checkout ${{ env.PICK_REF }}
          cargo build --release --manifest-path /tmp/pick/Cargo.toml --bin pentest-agent --target ${{ matrix.target }}
          cp /tmp/pick/target/${{ matrix.target }}/release/pentest-agent dist/

      - name: Checkout and build ks-connector
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/Strike48-public/kubestudio.git /tmp/kubestudio
          git -C /tmp/kubestudio checkout ${{ env.KUBESTUDIO_REF }}
          cargo build --release --manifest-path /tmp/kubestudio/Cargo.toml --bin ks-connector --features connector --target ${{ matrix.target }}
          cp /tmp/kubestudio/target/${{ matrix.target }}/release/ks-connector dist/

      - name: Build DMG
        run: |
          chmod +x scripts/build-dmg.sh
          ./scripts/build-dmg.sh ci-test ${{ matrix.arch }}

      - name: Verify DMG
        run: |
          ls -la StrikeHub-*.dmg
          hdiutil verify StrikeHub-*.dmg
          # Mount and verify app bundle contents
          hdiutil attach StrikeHub-*.dmg -mountpoint /tmp/dmg-verify
          echo "=== App bundle contents ==="
          ls -la /tmp/dmg-verify/StrikeHub.app/Contents/MacOS/
          test -x /tmp/dmg-verify/StrikeHub.app/Contents/MacOS/strikehub || (echo "FAIL: wrapper missing" && exit 1)
          test -x /tmp/dmg-verify/StrikeHub.app/Contents/MacOS/strikehub-bin || (echo "FAIL: binary missing" && exit 1)
          test -f /tmp/dmg-verify/StrikeHub.app/Contents/Info.plist || (echo "FAIL: Info.plist missing" && exit 1)
          codesign --verify /tmp/dmg-verify/StrikeHub.app && echo "Codesign OK"
          # Check wrapper sets correct URLs
          grep -q "studio.strike48.com" /tmp/dmg-verify/StrikeHub.app/Contents/MacOS/strikehub || (echo "FAIL: production URL missing from wrapper" && exit 1)
          echo "=== All checks passed ==="
          hdiutil detach /tmp/dmg-verify

      - uses: actions/upload-artifact@v4
        with:
          name: strikehub-dmg-${{ matrix.arch }}
          path: StrikeHub-*.dmg

  build-appimage:
    name: Build AppImage
    if: github.repository_owner == 'Strike48-public'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            libpcap-dev \
            file \
            wget \
            imagemagick \
            libfuse2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-gnu-appimage

      - name: Build binary
        run: cargo build --release --target x86_64-unknown-linux-gnu --no-default-features --features desktop

      - name: Load connector refs
        run: cat connector-versions.env >> "$GITHUB_ENV"

      - name: Prepare dist directory
        run: mkdir -p dist

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}

      - name: Checkout and build pentest-agent
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/Strike48-public/pick.git /tmp/pick
          git -C /tmp/pick checkout ${{ env.PICK_REF }}
          cargo build --release --manifest-path /tmp/pick/Cargo.toml --bin pentest-agent --target x86_64-unknown-linux-gnu
          cp /tmp/pick/target/x86_64-unknown-linux-gnu/release/pentest-agent dist/

      - name: Checkout and build ks-connector
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/Strike48-public/kubestudio.git /tmp/kubestudio
          git -C /tmp/kubestudio checkout ${{ env.KUBESTUDIO_REF }}
          cargo build --release --manifest-path /tmp/kubestudio/Cargo.toml --bin ks-connector --features connector --target x86_64-unknown-linux-gnu
          cp /tmp/kubestudio/target/x86_64-unknown-linux-gnu/release/ks-connector dist/

      - name: Build AppImage
        run: |
          chmod +x scripts/build-appimage.sh
          ./scripts/build-appimage.sh ci-test x86_64

      - name: Verify AppImage
        run: |
          ls -la StrikeHub-*.AppImage
          chmod +x StrikeHub-*.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: strikehub-appimage
          path: StrikeHub-*.AppImage

  build-msi:
    name: Build MSI
    if: github.repository_owner == 'Strike48-public'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-pc-windows-msvc-msi

      - name: Build binary
        run: cargo build --release --target x86_64-pc-windows-msvc --no-default-features --features desktop

      - name: Load connector refs
        shell: bash
        run: cat connector-versions.env >> "$GITHUB_ENV"

      - name: Prepare dist directory
        shell: bash
        run: mkdir -p dist

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}

      - name: Checkout and build pentest-agent
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/Strike48-public/pick.git /tmp/pick
          git -C /tmp/pick checkout ${{ env.PICK_REF }}
          cargo build --release --manifest-path /tmp/pick/Cargo.toml --bin pentest-agent --target x86_64-pc-windows-msvc
          cp /tmp/pick/target/x86_64-pc-windows-msvc/release/pentest-agent.exe dist/

      - name: Checkout and build ks-connector
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/Strike48-public/kubestudio.git /tmp/kubestudio
          git -C /tmp/kubestudio checkout ${{ env.KUBESTUDIO_REF }}
          cargo build --release --manifest-path /tmp/kubestudio/Cargo.toml --bin ks-connector --features connector --target x86_64-pc-windows-msvc
          cp /tmp/kubestudio/target/x86_64-pc-windows-msvc/release/ks-connector.exe dist/

      - name: Install WiX Toolset
        run: choco install wixtoolset -y

      - name: Build MSI
        shell: pwsh
        run: |
          .\scripts\build-msi.ps1 -Version 0.0.0

      - uses: actions/upload-artifact@v4
        with:
          name: strikehub-msi
          path: StrikeHub-*.msi

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint chart/strikehub
