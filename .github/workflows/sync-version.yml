name: Sync Version

on:
  # Run after Release workflow completes on a tag
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches-ignore:
      - '**'
  # Also trigger directly on tag push as backup
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  sync-version:
    name: Sync Cargo.toml version
    if: github.repository_owner == 'Strike48-public'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          # Get the tag that triggered this (either from workflow_run or direct push)
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            TAG="$WORKFLOW_RUN_HEAD_BRANCH"
          else
            TAG="$REF_NAME"
          fi
          # Strip 'v' prefix
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VERSION from tag: $TAG"

      - name: Check if update needed
        id: check
        run: |
          CURRENT=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "Current version: $CURRENT"
          echo "Target version: ${{ steps.version.outputs.version }}"
          if [ "$CURRENT" = "${{ steps.version.outputs.version }}" ]; then
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update Cargo.toml
        if: steps.check.outputs.needs_update == 'true'
        run: |
          sed -i 's/^version = ".*"/version = "${{ steps.version.outputs.version }}"/' Cargo.toml
          echo "Updated Cargo.toml to version ${{ steps.version.outputs.version }}"
          grep -m1 '^version = ' Cargo.toml

      - name: Commit and push
        if: steps.check.outputs.needs_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          git commit -m "chore: sync version to ${{ steps.version.outputs.tag }}"
          git push origin main
