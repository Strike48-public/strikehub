name: Sync Version

on:
  # Run after Release workflow completes on a tag
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches-ignore:
      - '**'
  # Also trigger directly on tag push as backup
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-version:
    name: Sync Cargo.toml version
    if: github.repository_owner == 'Strike48-public'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          # Get the tag that triggered this (either from workflow_run or direct push)
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            TAG="$WORKFLOW_RUN_HEAD_BRANCH"
          else
            TAG="$REF_NAME"
          fi
          # Strip 'v' prefix
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VERSION from tag: $TAG"

      - name: Check if update needed
        id: check
        env:
          TARGET_VERSION: ${{ steps.version.outputs.version }}
        run: |
          CURRENT=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "Current version: $CURRENT"
          echo "Target version: $TARGET_VERSION"
          if [ "$CURRENT" = "$TARGET_VERSION" ]; then
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update Cargo.toml
        if: steps.check.outputs.needs_update == 'true'
        env:
          TARGET_VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed -i "s/^version = \".*\"/version = \"$TARGET_VERSION\"/" Cargo.toml
          echo "Updated Cargo.toml to version $TARGET_VERSION"
          grep -m1 '^version = ' Cargo.toml

      - name: Create Pull Request
        if: steps.check.outputs.needs_update == 'true'
        env:
          SYNC_TAG: ${{ steps.version.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create a branch for the version sync
          BRANCH_NAME="chore/sync-version-$SYNC_TAG"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH_NAME"
          git add Cargo.toml
          git commit -m "chore: sync version to $SYNC_TAG"
          git push origin "$BRANCH_NAME"

          # Create the pull request
          gh pr create \
            --title "chore: sync version to $SYNC_TAG" \
            --body "Automatically sync Cargo.toml version to match git tag $SYNC_TAG" \
            --base main \
            --head "$BRANCH_NAME"
